version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://pos_user:pos_password@db:5432/pos_db
      SECRET_KEY: your-production-secret-key-change-this
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OTP_SECRET: your-production-otp-secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  admin_frontend:
    build: ./admin_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./admin_frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./admin_frontend/build:/usr/share/nginx/html
    depends_on:
      - backend
      - admin_frontend

volumes:
  postgres_data: