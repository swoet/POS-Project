name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        cd backend
        python -m pytest --cov=. --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: admin_frontend/package-lock.json
    - name: Install dependencies
      run: |
        cd admin_frontend
        npm ci
    - name: Run linter
      run: |
        cd admin_frontend
        npm run lint
    - name: Run tests
      run: |
        cd admin_frontend
        npm test -- --coverage --watchAll=false
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./admin_frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  desktop-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: pos_desktop_electron/package-lock.json
    - name: Install dependencies
      run: |
        cd pos_desktop_electron
        npm ci
    - name: Build application
      run: |
        cd pos_desktop_electron
        npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint, desktop-build]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/pos-backend:latest
    - name: Build and push admin frontend
      uses: docker/build-push-action@v4
      with:
        context: ./admin_frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/pos-admin-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying to production server..."
        # Add your deployment commands here
        # For example: ssh to server and run docker-compose up -d